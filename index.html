    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,900&family=Barlow+Condensed:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,900&family=Barlow+Condensed:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" />
    <title>VAAD Development | Launch-ready websites and web apps</title>
  </head>
  <body>
    <script>
      (function () {
        var path = (window.location.pathname || '').toLowerCase();
        if (!path.startsWith('/admin')) return;

        var style = document.createElement('style');
        style.textContent = [
          '#admin-emergency-fallback{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#06060c;color:#f4f5ff;z-index:100000;padding:16px;}',
          '#admin-emergency-fallback .card{width:100%;max-width:420px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:20px;font-family:DM Sans,sans-serif;}',
          '#admin-emergency-fallback h1{margin:0 0 8px;font-size:18px;font-weight:700;font-family:Syne,DM Sans,sans-serif;}',
          '#admin-emergency-fallback p{margin:0 0 14px;font-size:13px;line-height:1.45;color:rgba(244,245,255,0.78);}',
          '#admin-emergency-fallback .actions{display:flex;gap:8px;flex-wrap:wrap;}',
          '#admin-emergency-fallback button{border:1px solid rgba(255,255,255,0.24);background:rgba(255,255,255,0.08);color:#f4f5ff;border-radius:10px;padding:9px 12px;font-size:12px;cursor:pointer;}',
          '#admin-emergency-fallback button:hover{background:rgba(255,255,255,0.16);}',
          'html.app-mounted #admin-emergency-fallback{display:none !important;}'
        ].join('');
        document.head.appendChild(style);

        var fallback = document.createElement('div');
        fallback.id = 'admin-emergency-fallback';
        fallback.innerHTML = [
          '<div class="card">',
          '<h1>Admin is loading</h1>',
          '<p>If the sign-in form does not appear in a few seconds, use Reload. This fallback stays visible to prevent a blank screen.</p>',
          '<div class="actions">',
          '<button type="button" id="admin-fallback-reload">Reload admin</button>',
          '<button type="button" id="admin-fallback-home">Open home</button>',
          '</div>',
          '</div>'
        ].join('');
        document.body.appendChild(fallback);

        var reloadButton = document.getElementById('admin-fallback-reload');
        if (reloadButton) {
          reloadButton.addEventListener('click', function () {
            window.location.replace('/admin?reload=' + Date.now());
          });
        }

        var homeButton = document.getElementById('admin-fallback-home');
        if (homeButton) {
          homeButton.addEventListener('click', function () {
            window.location.replace('/');
          });
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
